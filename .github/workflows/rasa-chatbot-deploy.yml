name: Rasa Chatbot FAQ Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      modelname:
        description: 'Rasa model name'
        required: false
        default: 'default'

env:
  PYTHON_VERSION: '3.8'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests tensorflow rasa

    - name: Create build ID
      run: |
        echo "${{ github.run_number }}" > modelname.txt
        echo "BUILD_VERSION=${{ github.run_number }}" >> $GITHUB_ENV

    - name: Run FAQ processing script
      run: |
        python chatscript.py

    - name: Train Rasa model
      run: |
        python rasatrain.py
        ls -la models/

    - name: Upload model to Rasa server
      env:
        RASA_SERVER_URL: ${{ secrets.RASA_SERVER_URL }}
        RASA_TOKEN: ${{ secrets.RASA_TOKEN }}
      run: |
        if [ -n "$RASA_SERVER_URL" ] && [ -n "$RASA_TOKEN" ]; then
          curl -X POST \
            -H "Authorization: Bearer $RASA_TOKEN" \
            -F "model=@models/${BUILD_VERSION}.tar.gz" \
            "$RASA_SERVER_URL/models"
        else
          echo "Rasa server credentials not configured, skipping upload"
        fi

    - name: Upload Rasa model via script
      env:
        RASA_USERNAME: ${{ secrets.RASA_USERNAME }}
        RASA_PASSWORD: ${{ secrets.RASA_PASSWORD }}
        RASA_SERVER_URL: ${{ secrets.RASA_SERVER_URL }}
      run: |
        if [ -n "$RASA_USERNAME" ] && [ -n "$RASA_PASSWORD" ]; then
          python rasaUpload.py
        else
          echo "Rasa credentials not configured, skipping script upload"
        fi

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Create and push FAQ updates
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TARGET_REPO: ${{ secrets.TARGET_FAQ_REPO }}
        FAQ_DIRECTORY: ${{ secrets.FAQ_DIRECTORY }}
      run: |
        if [ -n "$TARGET_REPO" ] && [ -n "$FAQ_DIRECTORY" ]; then
          # Create new branch
          BRANCH_NAME="github-actions-build-${BUILD_VERSION}"
          git checkout -b "$BRANCH_NAME"
          
          # Clone target repository if different from current
          if [ "$TARGET_REPO" != "${{ github.repository }}" ]; then
            git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${TARGET_REPO}.git" target-repo
            cd target-repo
            git checkout -b "$BRANCH_NAME"
            cd ..
            cp faq.mdx "target-repo/${FAQ_DIRECTORY}/" || echo "FAQ file not found"
            cd target-repo
          else
            # Same repository
            if [ -f faq.mdx ]; then
              cp faq.mdx "${FAQ_DIRECTORY}/" || mkdir -p "${FAQ_DIRECTORY}" && cp faq.mdx "${FAQ_DIRECTORY}/"
            fi
          fi
          
          # Commit and push changes
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated FAQ Update - Build ${BUILD_VERSION}"
            git push origin "$BRANCH_NAME"
            
            # Create pull request using GitHub CLI
            gh pr create \
              --title "Automated FAQ Update - Build ${BUILD_VERSION}" \
              --body "Automated FAQ update generated by GitHub Actions build ${BUILD_VERSION}" \
              --base main \
              --head "$BRANCH_NAME" || echo "PR creation failed or already exists"
          fi
        else
          echo "Target repository not configured, skipping FAQ deployment"
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: rasa-models-${{ github.run_number }}
        path: |
          models/
          faq.mdx
          auth.txt
        retention-days: 30
