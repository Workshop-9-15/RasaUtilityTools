name: Rasa FAQ Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_VERSION: ${{ github.run_number }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.7'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create Build ID
      run: |
        echo "Creating Build ID"
        echo ${{ env.BUILD_VERSION }} > modelname.txt
        
    - name: Run FAQ Processing Script
      run: |
        echo "Run File Creation Script"
        python chatscript.py
        
    - name: Train Rasa Models
      run: |
        echo "Train Models"
        python rasatrain.py
        ls -la models/
        
    - name: Upload Model to Rasa X
      run: |
        echo "Upload model to Rasa X"
        curl -k -F "model=@models/${{ env.BUILD_VERSION }}.tar.gz" "${{ secrets.RASA_URL_WITH_TOKEN }}"
        
    - name: Tag Model as Production
      run: |
        echo "Tag Rasa Model as Production"
        python rasaUpload.py
      env:
        RASA_URL: ${{ secrets.RASA_URL }}
        RASA_USERNAME: ${{ secrets.RASA_USERNAME }}
        RASA_PASSWORD: ${{ secrets.RASA_PASSWORD }}
        
    - name: Setup Git Configuration
      run: |
        git config --global user.name "${{ secrets.GIT_USER_NAME }}"
        git config --global user.email "${{ secrets.GIT_USER_EMAIL }}"
        
    - name: Clone Website Repository
      run: |
        echo "Start GIT Workflow"
        git clone https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ secrets.WEBSITE_REPO_URL }}.git website-repo
        cd website-repo
        git remote -v
        
    - name: Create Website Update Branch
      run: |
        cd website-repo
        git checkout -b "github-actions-build-${{ env.BUILD_VERSION }}"
        git remote add upstream https://github.com/${{ secrets.WEBSITE_REPO_URL }}.git
        git pull upstream main || git pull upstream master
        
    - name: Copy FAQ File and Commit Changes
      run: |
        cp faq.mdx website-repo/${{ secrets.WEBSITE_FAQ_PATH }}/
        cd website-repo
        git add ${{ secrets.WEBSITE_FAQ_PATH }}/faq.mdx
        git commit -m "Automated FAQ Update - Build ${{ env.BUILD_VERSION }}"
        git push --set-upstream origin github-actions-build-${{ env.BUILD_VERSION }}
        
    - name: Create Pull Request
      run: |
        cd website-repo
        gh pr create \
          --title "Automated FAQ Update - Build ${{ env.BUILD_VERSION }}" \
          --body "Automated FAQ update from Rasa FAQ Pipeline build ${{ env.BUILD_VERSION }}" \
          --base main \
          --head github-actions-build-${{ env.BUILD_VERSION }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Create Success Marker
      run: |
        echo "Pipeline completed successfully" > pipeline-success.txt
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: rasa-pipeline-artifacts-${{ env.BUILD_VERSION }}
        path: |
          models/
          faq.mdx
          data/
          working.txt
          pipeline-success.txt
        retention-days: 30

  cleanup:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: always()
    
    steps:
    - name: Delete old workflow runs
      uses: actions/github-script@v6
      with:
        script: |
          const runs = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'rasa-faq-pipeline.yml',
            per_page: 100
          });
          
          const runsToDelete = runs.data.workflow_runs.slice(5);
          
          for (const run of runsToDelete) {
            try {
              await github.rest.actions.deleteWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id
              });
              console.log(`Deleted workflow run ${run.id}`);
            } catch (error) {
              console.log(`Failed to delete workflow run ${run.id}: ${error.message}`);
            }
          }
